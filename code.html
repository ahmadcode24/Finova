<style>
        body {

        .glass-card {

            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);

        .glow-orb {
            position: relative;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle at center, #ffffff 0%, #1a1a1a 80%);
            border-radius: 50%;
            filter: blur(2px);
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 40px rgba(255,255,255,0.1); }
            100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 70px rgba(255,255,255,0.25); }
        }

        .active-pill-glow::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 20px;
            background: white;
            filter: blur(15px);
            opacity: 0.15;
            pointer-events: none;
        }

        .chat-input-container {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-input-container:focus-within {
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<script>
        // Simple micro-interaction for the chat input
        const input = document.getElementById('chat-input');
        const container = input.closest('.chat-input-container');

        input.addEventListener('focus', () => {
            container.style.transform = 'translateY(-4px)';
        });

        input.addEventListener('blur', () => {
            container.style.transform = 'translateY(0)';
        });

        // Add keyboard support for simulation
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== '') {
                console.log('Message sent:', input.value);
                input.value = '';
            }
        });
